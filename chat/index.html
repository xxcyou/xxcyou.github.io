<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>NEXUS · Chat</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-particles"></div>
  <div class="auth-card">
    <div class="auth-logo">NEXUS CHAT</div>
    <h1 class="auth-title">欢迎回来</h1>
    <p class="auth-sub">实时多频道聊天室<br/>使用 GitHub 账号安全登录</p>
    <button id="login-btn" class="btn-login">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
      </svg>
      使用 GitHub 登录
    </button>
    <p class="auth-hint">登录即表示同意以文明方式使用本聊天室</p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <!-- CHAT MAIN -->
  <main class="chat-main">
    <header class="chat-header">
      <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
      <div class="chat-header-info">
        <span class="channel-hash">#</span>
        <span class="channel-title" id="channel-title">general</span>
        <span class="channel-sep">·</span>
        <span class="channel-desc" id="channel-desc"></span>
      </div>
      <div class="header-right">
        <span class="online-pill">
          <span class="pulse-dot"></span>
          <span id="header-online">0</span> 在线
        </span>
      </div>
    </header>

    <div id="messages" class="messages"></div>

    <!-- REPLY BAR -->
    <div id="reply-bar" class="reply-bar" style="display:none">
      <div class="reply-inner">
        <span class="reply-icon">↩</span>
        <span>回复 </span><strong id="reply-user"></strong>
        <span class="reply-preview" id="reply-preview"></span>
      </div>
      <button id="reply-cancel" class="reply-cancel">✕</button>
    </div>

    <!-- INPUT -->
    <div class="input-area">
      <button class="input-btn" id="btn-emoji" title="表情">😊</button>
      <label class="input-btn" title="图片">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <input type="file" id="img-input" accept="image/*" style="display:none"/>
      </label>
      <textarea id="msg-input" class="msg-input" placeholder="发消息…" rows="1"></textarea>
      <button class="btn-send" id="btn-send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
      <div id="emoji-picker" class="emoji-picker" style="display:none"></div>
    </div>
  </main>

  <!-- DOCK PANELS -->
  <div id="panel-channels" class="dock-panel" style="display:none">
    <div class="panel-head">
      <span>频道</span>
      <span class="online-badge" id="online-count">0</span>
      <button class="admin-only panel-add-btn" id="btn-add-channel" style="display:none">＋</button>
    </div>
    <div id="channel-list" class="channel-list"></div>
  </div>

  <div id="panel-members" class="dock-panel" style="display:none">
    <div class="panel-head"><span>在线成员</span></div>
    <div id="online-list" class="online-section"></div>
  </div>

  <div id="panel-profile" class="dock-panel" style="display:none">
    <div class="panel-head"><span>个人中心</span></div>
    <div class="profile-body">
      <div class="profile-avatar-wrap">
        <img id="profile-avatar-img" src="" alt="" style="display:none"/>
        <div id="profile-avatar-ph" class="profile-avatar-ph"></div>
        <label class="profile-avatar-edit" title="更换头像">
          📷
          <input type="file" id="avatar-input" accept="image/*" style="display:none"/>
        </label>
      </div>
      <div class="profile-name-wrap">
        <input type="text" id="profile-display-name" class="profile-input" placeholder="昵称" maxlength="20"/>
        <div class="profile-github-name" id="profile-github-name"></div>
      </div>
      <button class="profile-save-btn" id="profile-save-btn">保存昵称</button>
      <button class="profile-logout-btn" id="btn-logout">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
        </svg>
        退出登录
      </button>
    </div>
  </div>

  <!-- TOKEN WIDGET -->
  <div id="token-widget" class="token-widget" style="display:none">
    <div class="token-widget-title">🔑 Lua 验证码</div>
    <div class="token-code" id="token-code">------</div>
    <div class="token-timer" id="token-timer">有效期 5 分钟</div>
    <button class="token-copy-btn" id="token-copy-btn">复制验证码</button>
    <button class="token-refresh-btn" id="token-refresh-btn">↻ 重新生成</button>
  </div>

  <!-- BOTTOM DOCK -->
  <div id="dock-wrap" class="dock-wrap">
    <div class="dock-peek" id="dock-peek">›</div>
    <div class="dock-bar" id="dock-bar">

      <button class="dock-btn" id="dock-channels">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span>频道</span>
      </button>

      <button class="dock-btn" id="dock-members">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span>成员</span>
      </button>

      <div class="dock-divider"></div>

      <!-- CENTER AVATAR (凸起) -->
      <button class="dock-btn dock-center" id="dock-profile">
        <div class="dock-avatar-wrap">
          <img id="dock-avatar-img" src="" alt="" style="display:none"/>
          <div id="dock-avatar-ph" class="dock-avatar-ph"></div>
          <div class="dock-avatar-online"></div>
        </div>
        <span id="dock-display-name">我</span>
      </button>

      <div class="dock-divider"></div>

      <button class="dock-btn admin-only" id="dock-admin" style="display:none">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <span>后台</span>
      </button>

      <button class="dock-btn" id="dock-token">
        <span style="font-size:20px">🔑</span>
        <span>验证码</span>
      </button>

    </div>
  </div>

</div>

<!-- CHANNEL MODAL -->
<div id="modal-channel" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-title">新建频道</div>
    <input type="text" id="new-channel-name" class="modal-input" placeholder="频道名称" maxlength="32"/>
    <input type="text" id="new-channel-desc" class="modal-input" placeholder="频道描述（可选）" maxlength="100"/>
    <div class="modal-actions">
      <button class="btn-modal-cancel" id="modal-cancel">取消</button>
      <button class="btn-modal-ok" id="modal-ok">创建</button>
    </div>
  </div>
</div>

<!-- IMAGE MODAL -->
<div id="modal-img" class="modal-overlay modal-img-overlay" style="display:none">
  <img id="modal-img-src" src="" alt=""/>
  <button class="modal-img-close" id="modal-img-close">✕</button>
</div>

<script src="app.js"></script>
</body>
</html>
